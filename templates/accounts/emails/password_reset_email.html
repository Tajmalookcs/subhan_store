<!DOCTYPE html>
<html>
<body style="font-family:Arial,sans-serif;max-width:500px;margin:0 auto;padding:20px;">
    <h2 style="color:#1a6b3c;">Subhan Super Store</h2>
    <p>Hi {{ user.get_full_name|default:user.username }},</p>
    <p>You requested a password reset. Click the button below to set a new password:</p>
    <p>
        <a href="{{ protocol }}://{{ domain }}{% url 'accounts:password_reset_confirm' uidb64=uid token=token %}"
           style="background:#1a6b3c;color:white;padding:12px 24px;text-decoration:none;border-radius:6px;display:inline-block;">
            Reset My Password
        </a>
    </p>
    <p style="color:#666;font-size:0.85rem;">
        If you didn't request this, you can safely ignore this email.
        This link will expire in 24 hours.
    </p>
    <hr>
    <p style="color:#999;font-size:0.75rem;">Subhan Super Store, Jaranwala</p>
</body>
</html>
