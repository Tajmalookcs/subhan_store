{% extends 'base_admin.html' %}
{% block title %}Delete {{ object_type }} — Subhan Super Store{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card border-0 shadow-sm text-center">
            <div class="card-body p-5">
                <div class="mb-3">
                    <i class="bi bi-trash3 text-danger" style="font-size:3rem;"></i>
                </div>
                <h5 class="fw-bold">Delete {{ object_type }}?</h5>
                <p class="text-muted mb-4">
                    Are you sure you want to delete <strong>{{ object }}</strong>?
                    This action cannot be undone.
                </p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2 justify-content-center">
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash me-1"></i>Yes, Delete
                        </button>
                        <a href="{{ cancel_url }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
